<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портал Дія — Irnovia Dox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="container flex-between">
            <div class="nav-links">
                <a href="#" onclick="Navigation.goTo('services')">Каталог послуг</a>
                <a href="#" onclick="Navigation.goTo('stateInfo')">Що таке Дія</a>
                <a href="#" onclick="Navigation.goTo('news')">Новини</a>
            </div>
            <div class="auth-links">
                <a href="#" class="btn-text" onclick="Navigation.goTo('register')">Зареєструватися</a>
                <a href="#" class="btn-black" onclick="Navigation.goTo('documents')">Увійти до кабінету</a>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="main-header">
        <div class="container flex-between">
            <div class="logo-area" onclick="Navigation.goTo('documents')">
                <img src="logo.png" alt="Дія" class="diia-logo">
                <div class="state-branding">
                    <span class="state-name">Irnovia Dox</span>
                    <span class="state-sub">Державні послуги онлайн</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="search-btn">Пошук</button>
                <button id="audioToggle" class="audio-btn">🔇</button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="mainContent">
        <!-- Content injected by app.js -->
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div>
                    <img src="logo.png" alt="Дія" class="footer-logo">
                    <p>© 2019 - 2026. Всі права захищені.</p>
                </div>
                <div class="footer-links">
                    <a href="#" onclick="Navigation.goTo('adminLogin')">Адмін-панель</a>
                    <a href="#">Обробка персональних даних</a>
                    <a href="#">Тарифи</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Audio Player -->
    <audio id="bgAudio" loop>
        <source src="https://www.dropbox.com/scl/fi/5j64cfujhng8pgyu0rrpm/.mp3?rlkey=old2xmltro4qu49z8hbqn467n&st=ns4o1pmq&raw=1" type="audio/mpeg">
    </audio>

    <script src="app.js"></script>
</body>
</html>
